<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin Manajemen Pesanan - Cimocabi</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Poppins', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <nav class="bg-indigo-900 text-white px-6 py-4 shadow-md flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-amber-400 rounded-lg flex items-center justify-center text-indigo-900 font-bold">C</div>
            <h1 class="text-base font-bold tracking-wider">CIMOCABI ADMIN PANEL</h1>
        </div>
        <button onclick="fetchSemuaDataPesanan()" class="bg-indigo-700 hover:bg-indigo-600 text-xs px-4 py-2 rounded-xl transition flex items-center space-x-2 cursor-pointer">
            <i class="fa-solid fa-arrows-rotate"></i> <span>Refresh Data Sheet</span>
        </button>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-4 rounded-2xl shadow-xs border border-slate-100">
                <p class="text-slate-400 text-[10px] font-medium uppercase">Total Omset Sukses</p>
                <p id="stat-omset" class="text-base font-bold text-indigo-600 mt-1">Rp 0</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-xs border border-slate-100">
                <p class="text-slate-400 text-[10px] font-medium uppercase">Antrean Menunggu</p>
                <p id="stat-menunggu" class="text-base font-bold text-amber-500 mt-1">0 Order</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-xs border border-slate-100">
                <p class="text-slate-400 text-[10px] font-medium uppercase">Sedang Diproses</p>
                <p id="stat-diproses" class="text-base font-bold text-blue-500 mt-1">0 Order</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-xs border border-slate-100">
                <p class="text-slate-400 text-[10px] font-medium uppercase">Total Pesanan Masuk</p>
                <p id="stat-total" class="text-base font-bold text-slate-700 mt-1">0 Order</p>
            </div>
        </div>

        <div class="flex flex-wrap gap-1.5 border-b border-slate-200 pb-3 mb-4 text-xs">
            <button onclick="switchTabFilter('All', this)" class="tab-btn px-4 py-2 rounded-xl bg-indigo-600 text-white font-medium shadow-xs cursor-pointer">Semua Data</button>
            <button onclick="switchTabFilter('Menunggu', this)" class="tab-btn px-4 py-2 rounded-xl bg-white text-slate-600 hover:bg-slate-100 font-medium cursor-pointer">Menunggu</button>
            <button onclick="switchTabFilter('Diproses', this)" class="tab-btn px-4 py-2 rounded-xl bg-white text-slate-600 hover:bg-slate-100 font-medium cursor-pointer">Diproses</button>
            <button onclick="switchTabFilter('Dikirim', this)" class="tab-btn px-4 py-2 rounded-xl bg-white text-slate-600 hover:bg-slate-100 font-medium cursor-pointer">Dikirim</button>
            <button onclick="switchTabFilter('Selesai', this)" class="tab-btn px-4 py-2 rounded-xl bg-white text-slate-600 hover:bg-slate-100 font-medium cursor-pointer">Selesai</button>
        </div>

        <div id="loading-state-element" class="text-center py-12 bg-white rounded-2xl border border-slate-100 shadow-xs">
            <i class="fa-solid fa-spinner text-3xl text-indigo-600 animate-spin"></i>
            <p class="text-xs text-slate-400 mt-2 font-medium">Sedang mengambil log transaksi dari Google Sheet...</p>
        </div>

        <div id="admin-orders-grid" class="grid gap-4 grid-cols-1 md:grid-cols-2 hidden">
            </div>
    </main>

    <script>
        // MASUKKAN URL WEB APP DEPLOYMENT GOOGLE APPS SCRIPT SAKTI ANDA DI SINI (SAMA DENGAN LINK DI FORM CHECKOUT)
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyyCsr8M7s7IWRoBm7H811oSi3VPM9gwdwkFPBlxdwjT8X2Rf0XlDSaG9a-2mY5btjR/exec";

        let masterDataPesanan = [];
        let currentActiveTab = "All";

        async function fetchSemuaDataPesanan() {
            document.getElementById('loading-state-element').classList.remove('hidden');
            document.getElementById('admin-orders-grid').classList.add('hidden');
            
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                const resObj = await response.json();
                
                if (resObj.status === "success") {
                    masterDataPesanan = resObj.data;
                    kalkulasiUlangMetriksToko();
                    renderPesananKeGrid();
                } else {
                    alert("Gagal sinkronisasi data sheet: " + resObj.message);
                }
            } catch (err) {
                console.error("Gagal interaktivitas API Gateway:", err);
                alert("Akses Server Terputus, pastikan deployment Apps Script Anda diset ke 'Anyone'.");
            } finally {
                document.getElementById('loading-state-element').classList.add('hidden');
                document.getElementById('admin-orders-grid').classList.remove('hidden');
            }
        }

        function kalkulasiUlangMetriksToko() {
            let totalOmset = 0;
            let countMenunggu = 0;
            let countDiproses = 0;

            masterDataPesanan.forEach(item => {
                const totalVal = parseFloat(item.total_harga) || 0;
                // Skema pencatatan properti objek mengikuti casing buatan Apps Script
                const statusStr = item.status_pesanan;
                
                if (statusStr === "Selesai") totalOmset += totalVal;
                if (statusStr === "Menunggu") countMenunggu++;
                if (statusStr === "Diproses") countDiproses++;
            });

            document.getElementById('stat-omset').innerText = "Rp " + totalOmset.toLocaleString('id-ID');
            document.getElementById('stat-menunggu').innerText = countMenunggu + " Order";
            document.getElementById('stat-diproses').innerText = countDiproses + " Order";
            document.getElementById('stat-total').innerText = masterDataPesanan.length + " Order";
        }

        function switchTabFilter(tabName, currentBtn) {
            currentActiveTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-xs');
                btn.classList.add('bg-white', 'text-slate-600');
            });
            currentBtn.classList.remove('bg-white', 'text-slate-600');
            currentBtn.classList.add('bg-indigo-600', 'text-white', 'shadow-xs');
            renderPesananKeGrid();
        }

        function renderPesananKeGrid() {
            const grid = document.getElementById('admin-orders-grid');
            grid.innerHTML = '';

            const filteredData = masterDataPesanan.filter(item => {
                if (currentActiveTab === "All") return true;
                return item.status_pesanan === currentActiveTab;
            });

            if (filteredData.length === 0) {
                grid.innerHTML = `<div class="col-span-full bg-white text-center text-xs text-slate-400 py-12 rounded-2xl border border-slate-100">Tidak ada log transaksi dengan status "${currentActiveTab}".</div>`;
                return;
            }

            filteredData.forEach(order => {
                let badgeClass = "bg-amber-50 text-amber-600 border-amber-200";
                if(order.status_pesanan === "Diproses") badgeClass = "bg-blue-50 text-blue-600 border-blue-200";
                if(order.status_pesanan === "Dikirim") badgeClass = "bg-purple-50 text-purple-600 border-purple-200";
                if(order.status_pesanan === "Selesai") badgeClass = "bg-emerald-50 text-emerald-600 border-emerald-200";

                grid.innerHTML += `
                    <div class="bg-white rounded-2xl p-4 border border-slate-100 shadow-xs flex flex-col justify-between transition hover:shadow-md">
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <span class="text-[9px] font-mono font-bold text-slate-400 block">${order.tanggal_order}</span>
                                    <h3 class="text-xs font-bold text-slate-800 tracking-wide">${order.id_pesanan}</h3>
                                </div>
                                <span class="text-[9px] font-bold px-2 py-0.5 rounded-md border ${badgeClass}">${order.status_pesanan}</span>
                            </div>
                            
                            <div class="space-y-1 text-xs my-3 bg-slate-50/50 p-2.5 rounded-xl border border-slate-100/50">
                                <p class="text-slate-700 font-medium"><i class="fa-solid fa-user text-[10px] mr-1 text-slate-400"></i> ${order.nama_pembeli}</p>
                                <p class="text-slate-600"><i class="fa-solid fa-location-dot text-[10px] mr-1 text-slate-400"></i> ${order.alamat_pengiriman}</p>
                                <p class="text-slate-600"><i class="fa-solid fa-box text-[10px] mr-1 text-slate-400"></i> <span class="font-semibold text-indigo-600">${order.produk}</span> (${order.qty} Item)</p>
                                <p class="text-slate-400 text-[10px] italic"><i class="fa-solid fa-comment-dots mr-1"></i> Notes: ${order.catatan}</p>
                            </div>
                        </div>

                        <div class="border-t border-slate-100 pt-3 mt-1 flex flex-wrap gap-2 items-center justify-between">
                            <div class="text-xs">
                                <span class="text-slate-400 text-[10px] block">Total Tagihan</span>
                                <span class="font-bold text-indigo-600">Rp ${Number(order.total_harga).toLocaleString('id-ID')}</span>
                            </div>
                            
                            <div class="flex items-center space-x-1">
                                <select onchange="updateStatusPesanan('${order.id_pesanan}', this)" class="bg-slate-100 text-[10px] font-semibold text-slate-700 rounded-lg px-2 py-1 focus:outline-none border border-slate-200 cursor-pointer">
                                    <option value="" disabled selected>Ubah Status</option>
                                    <option value="Menunggu">Menunggu</option>
                                    <option value="Diproses">Diproses</option>
                                    <option value="Dikirim">Dikirim</option>
                                    <option value="Selesai">Selesai</option>
                                </select>
                                <a href="https://wa.me/${order.nomor_whatsapp}" target="_blank" class="bg-emerald-500 hover:bg-emerald-600 text-white w-7 h-7 rounded-lg flex items-center justify-center shadow-xs transition text-xs" title="Chat Pembeli">
                                    <i class="fa-brands fa-whatsapp"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        async function updateStatusPesanan(idOrder, selectElement) {
            const statusBaru = selectElement.value;
            if (!statusBaru) return;

            if(!confirm(`Apakah Anda yakin ingin memperbarui status order ${idOrder} menjadi "${statusBaru}"?`)) {
                selectElement.value = "";
                return;
            }

            selectElement.disabled = true;
            
            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({
                        action: "updateStatus",
                        orderId: idOrder,
                        status: statusBaru
                    })
                });

                alert(`Status pesanan ${idOrder} sukses disinkronkan ke Google Sheet!`);
                fetchSemuaDataPesanan();
            } catch (err) {
                console.error("Gagal push pembaruan status data:", err);
                alert("Jaringan sibuk, gagal sinkronisasi status.");
                selectElement.disabled = false;
            }
        }

        window.onload = fetchSemuaDataPesanan;
    </script>
</body>
</html>
