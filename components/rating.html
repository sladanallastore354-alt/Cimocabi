<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beri Ulasan - CIMOCABI</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: #f5f5f5; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .rating-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; width: 100%; text-align: center; }
        .rating-box h2 { color: #e67e22; margin-bottom: 10px; }
        .rating-box p { font-size: 14px; color: #7f8c8d; margin-bottom: 20px; }
        
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #2c3e50; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; outline: none; }
        .form-control:focus { border-color: #e67e22; }

        /* Star Rating UI Efek Grayscale */
        .stars { display: flex; justify-content: center; gap: 10px; flex-direction: row-reverse; margin-bottom: 20px; }
        .stars input { display: none; }
        .stars label { font-size: 35px; cursor: pointer; transition: 0.2s; filter: grayscale(100%) opacity(0.3); }
        .stars input:checked ~ label { filter: grayscale(0%) opacity(1); }
        .stars label:hover, .stars label:hover ~ label { filter: grayscale(0%) opacity(1); }

        .btn-submit { width: 100%; background: #27ae60; color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-submit:hover { background: #2ecc71; }
        .btn-submit:disabled { background: #95a5a6; cursor: not-allowed; }

        .back-link { display: block; margin-top: 15px; font-size: 13px; color: #3498db; text-decoration: none; }
    </style>
</head>
<body>

    <div class="rating-box">
        <h2>Beri Ulasan CIMOCABI</h2>
        <p>Pendapat kamu sangat berharga untuk kami!</p>

        <form id="rating-form" onsubmit="submitRating(event)">
            <div class="form-group">
                <label>Nama Kamu</label>
                <input type="text" id="reviewer-name" class="form-control" placeholder="Contoh: Arif" required>
            </div>

            <div class="form-group">
                <label>Produk yang Dibeli</label>
                <select id="reviewed-product" class="form-control" required>
                    <option value="" disabled selected>Pilih Produk...</option>
                    <option value="Paket Hemat (Cireng + Cimol)">Paket Hemat (Cireng + Cimol)</option>
                    <option value="Paket Keluarga (Cireng + Cimol)">Paket Keluarga (Cireng + Cimol)</option>
                    <option value="Paket Arisan (Cireng + Cimol)">Paket Arisan (Cireng + Cimol)</option>
                    <option value="Paket Lapar">Paket Lapar</option>
                    <option value="Cireng isi Ayam / Keju">Cireng isi Ayam / Keju</option>
                    <option value="Cimol Keju">Cimol Keju</option>
                    <option value="Cooler Bag">Cooler Bag</option>
                    <option value="Bubble Wrap Extra">Bubble Wrap Extra</option>
                    <option value="Lainnya">Produk Lainnya</option>
                </select>
            </div>

            <div class="stars">
                <input type="radio" id="star5" name="rating" value="5" required> <label for="star5">⭐</label>
                <input type="radio" id="star4" name="rating" value="4"> <label for="star4">⭐</label>
                <input type="radio" id="star3" name="rating" value="3"> <label for="star3">⭐</label>
                <input type="radio" id="star2" name="rating" value="2"> <label for="star2">⭐</label>
                <input type="radio" id="star1" name="rating" value="1"> <label for="star1">⭐</label>
            </div>

            <div class="form-group">
                <label>Ulasan / Masukan</label>
                <textarea id="review-text" class="form-control" rows="3" placeholder="Gimana rasanya? Ceritain dong..." required></textarea>
            </div>

            <button type="submit" id="btn-submit" class="btn-submit">Kirim Ulasan 🚀</button>
        </form>

        <a href="../index.html" class="back-link">Kembali ke Beranda</a>
    </div>

    <script>
        function submitRating(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btn-submit');
            btn.innerText = "Mengirim...";
            btn.disabled = true;

            const nama = document.getElementById('reviewer-name').value;
            const produk = document.getElementById('reviewed-product').value;
            const ulasan = document.getElementById('review-text').value;
            const bintang = document.querySelector('input[name="rating"]:checked').value;

            // Payload data untuk dikirim ke Google Sheets
            const payload = {
                action: "submitRating",
                nama: nama,
                produk: produk,
                bintang: bintang,
                ulasan: ulasan,
                tanggal: new Date().toLocaleString('id-ID')
            };

            // LINK MILIK ANDA
            const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxkEtrVVD3r9TuFYZXSoL3EZw6zy57R7HMsQnGJu5GomNHrEsWNSjhJ8wsdEkzq8GrIDQ/exec';

            // PENGIRIMAN DATA ASLI KE GOOGLE SHEETS
            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                alert(`Terima kasih ${nama}! Rating ${bintang} Bintang berhasil dikirim ke sistem.`);
                window.location.href = "../index.html"; // Kembali ke halaman utama
            })
            .catch(error => {
                alert("Gagal mengirim ulasan, periksa koneksi internet.");
                btn.innerText = "Kirim Ulasan 🚀";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
