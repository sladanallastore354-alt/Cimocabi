<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIMOCABI | Camilan Enak & Praktis</title>
    <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="fireworksCanvas"></canvas>

    <header class="rainbow-bg">
        <div class="header-container">
            <div class="logo-wrapper">
                <img src="images/logo.jpg" alt="Logo" class="logo-bulat" onerror="this.src='https://via.placeholder.com/50'">
                <h1 id="header-title">CIMOCABI</h1>
                <span id="surprise-text" class="hidden-text">[ yakin cuma satu? ]</span>
            </div>
            <div class="header-actions">
                <div class="cart-icon" onclick="toggleCart()">🛒 <span id="cart-badge">0</span></div>
                <div class="kebab-menu" onclick="toggleDropdown(event)">&#8942;
                    <div id="dropdown-content" class="dropdown-hidden"></div>
                </div>
            </div>
        </div>
    </header>

    <section class="hero-section">
        <div class="hero-content">
            <h2>Cari ide hampers? Cimocabi aja!</h2>
            <p>OPEN PRE ORDER NOW! Camilan enak, gurih, praktis.</p>
        </div>
    </section>

    <section class="filter-section">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Cari...">
            <button onclick="searchProduct()">🔍</button>
        </div>
        <div class="category-buttons">
            <button onclick="filterCategory('semua')" class="category-btn active">Semua</button>
            <button onclick="filterCategory('food')" class="category-btn">Food</button>
            <button onclick="filterCategory('frozen')" class="category-btn">Frozen</button>
        </div>
    </section>

    <main><div id="product-grid" class="product-grid"></div></main>

    <div id="cart-overlay" class="overlay-hidden" style="display: none;">
        <div class="cart-panel">
            <div class="cart-header"><h3>Keranjang</h3><button onclick="toggleCart()">✕</button></div>
            <div id="cart-items"></div>
            <div class="cart-total"><p>Total: <span id="total-price">Rp 0</span></p></div>
            <div class="checkout-form">
                <input type="text" id="buyer-name" placeholder="Nama">
                <input type="text" id="buyer-address" placeholder="Alamat">
                <input type="tel" id="buyer-phone" placeholder="No WA">
                <textarea id="buyer-note" placeholder="Catatan"></textarea>
                <button class="btn-wa" onclick="checkoutWA()">Kirim ke WhatsApp</button>
            </div>
        </div>
    </div>

    <button class="fab fab-wa" onclick="askAdmin()">💬 Tanya</button>
    <button class="fab fab-tour" onclick="startTour()">🧲 Tour</button>

    <footer>
        <div class="footer-links">
            <a href="#" onclick="showTerm()">Syarat & Ketentuan</a>
            <a href="#" onclick="showPrivacy()">Kebijakan Privasi</a>
        </div>
    </footer>

    <div id="term-modal" class="modal-hidden"><div class="modal-content"><span class="close" onclick="closeTerm()">&times;</span><div id="term-text"></div></div></div>
    <div id="privacy-modal" class="modal-hidden"><div class="modal-content"><span class="close" onclick="closePrivacy()">&times;</span><div id="privacy-text"></div></div></div>
    <div id="custom-alert" class="custom-alert-hidden"><div class="custom-alert-content"><p id="custom-alert-message"></p><button onclick="closeCustomAlert()">Saya Mengerti</button></div></div>

    <script src="data_produk.js" defer></script>
    <script src="cart.js" defer></script>
    <script src="ask.js" defer></script>
    <script src="tour.js" defer></script>
    <script src="term.js" defer></script>
    <script src="kebijakan-privasi.js" defer></script>
    <script src="components/dropdown.js" defer></script>
    <script src="sold.js" defer></script>
</body>
</html>
